# active-models.toml — what is resident RIGHT NOW, per role.
# OPERATOR state under CONFIG_ROOT (default /etc/dgx-spark-inference). Seeded from
# this example by install.sh on first install; operator-owned thereafter. The ONLY
# file a swap edits (inference-cli use <role> <candidate>). The runtime catalog
# (available.toml) is never touched by swaps. See docs/architecture.md.
[active.agentic]
model_id   = "qwen36-27b-fp8"                   # must be in available.toml[agentic].models[].id
runtime_id = "sglang-v0.5.14-cu130-runtime-distro1.9.0"

[active.agentic-helper]
model_id   = "ornith-1.0-9b-fp8"
runtime_id = "sglang-v0.5.14-cu130-nvfp4fix1"
