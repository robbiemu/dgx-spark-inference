# Residency plan: primary ALREADY resident (production steady state), helper to load.
# The "resident" section expresses what's already up (its peak already consumed);
# the "admit" section is what the resolver is checking. This matches how the
# dispatcher actually runs: primary boots first and is up; helper loads against it.
device.total_gib = 121.7

# Host-wide policy. memavailable_floor_gib is the hard refusal line: the resolver
# will REFUSE to admit a model whose load would push system MemAvailable below
# this. Tunable per deployment — lower admits tighter residency (more risk);
# higher refuses sooner (safer). 6.0 observed safe in steady-state co-residency.
[policy]
memavailable_floor_gib = 6.0

[observed]
memavailable_now_gib = 45.0   # observed WITH the primary resident (post-primary reality)

# Already resident — their peak is already consumed; MemAvailable reflects this.
[[resident]]
model_id = "qwen36-27b-fp8"

# To be admitted now:
[[admit]]
role = "agentic-helper"
model_id = "ornith-1.0-9b-fp8"
